# Prometheus scrape config for gittensory self-host (#980 observability).
# Activated via: docker compose --profile observability up
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting + recording rule files. The glob is evaluated inside the container, where
# ./prometheus/rules is mounted at /etc/prometheus/rules (see docker-compose.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

# Ship firing alerts to Alertmanager (reachable by its compose service name on 9093).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: gittensory
    static_configs:
      - targets: ["gittensory:8787"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Postgres internals from prometheus-community/postgres_exporter. The exporter service starts only with
  # the Postgres profiles; SQLite-only installs show this target as absent/down without firing alerts.
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # GPU utilization/VRAM/temp/power from nvidia_gpu_exporter (#4367). The exporter starts only with
  # --profile gpu; on a non-GPU install this target just shows as absent/down, no alert fires on it.
  - job_name: gpu
    static_configs:
      - targets: ["gpu-exporter:9835"]
    scrape_interval: 15s

  # Backup freshness from the read-only backup-exporter sidecar. The metrics exist only when the backup
  # profile is active, which keeps backup alerts opt-in with the backup feature.
  - job_name: gittensory-backup
    # The exporter is a tiny BusyBox httpd wrapper around Prometheus text output. Prometheus v3 rejects
    # blank Content-Type responses unless the scrape protocol is explicit.
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["backup-exporter:9101"]
    scrape_interval: 60s

  # Claude Code usage telemetry, re-exposed by the OTEL collector's Prometheus exporter (--profile
  # observability + CLAUDE_CODE_ENABLE_TELEMETRY=1). An absent collector just shows the target as down.
  - job_name: claude-code-otel
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 15s
